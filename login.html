<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PONPES ALHIDAYAT - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --shadow-1: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-2: 0 16px 48px rgba(0, 0, 0, 0.2);
            --radius: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Mengunci total pergerakan halaman html dan body */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            overflow: hidden !important; /* Mematikan scrollbar X dan Y */
            touch-action: none; /* Mematikan gesture geser/tarik bawaan browser hp */
            overscroll-behavior: none; /* Mencegah efek membal saat ditarik di Chrome/Safari */
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 10% 80%, rgba(16, 185, 129, 0.35) 0%, transparent 50%),
                        radial-gradient(circle at 90% 20%, rgba(255, 255, 255, 0.25) 0%, transparent 50%),
                        radial-gradient(circle at 30% 50%, rgba(5, 150, 105, 0.15) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes bgFloat {
            0%, 100% { transform: scale(1) rotate(0deg); }
            33% { transform: scale(1.05) rotate(120deg); }
            66% { transform: scale(0.98) rotate(240deg); }
        }

        .main-container {
            display: flex;
            align-items: center;
            gap: 60px;
            width: 100%;
            max-width: 1200px;
            justify-content: space-between;
        }

        /* Branding Samping (Hanya muncul di Desktop) */
        .left-branding {
            flex: 1 1 50%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            animation: slideInLeft 0.8s ease-out;
            color: white;
            padding-right: 20px;
        }

        .branding-logo {
            width: 100%;
            max-width: 160px;
            height: auto;
            margin-bottom: 24px;
            border-radius: 20px;
            box-shadow: var(--shadow-1);
            object-fit: contain;
            animation: logoPulse 2.5s ease-in-out infinite;
        }

        .branding-title {
            font-size: clamp(2.2rem, 4vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .branding-subtitle {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.02em;
            line-height: 1.3;
        }

        /* Container Utama Form Login */
        .login-container {
            flex: 0 0 420px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-2);
            overflow: hidden;
            animation: slideInRight 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s both;
            /* Mengizinkan form internal merespon input/ketikan tanpa menggerakkan background */
            touch-action: auto; 
        }

        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

        .login-header {
            padding: 35px 30px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--glass-border);
        }

        .form-logo {
            width: 70px; 
            height: 70px;
            margin: 0 auto 12px;
            object-fit: contain;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .login-subtitle { color: rgba(255, 255, 255, 0.65); font-size: 0.85rem; }

        .login-form { padding: 25px 30px; }

        .input-group {
            position: relative;
            margin-bottom: 16px;
            width: 100%;
        }

        .input-group input {
            width: 100%;
            padding: 13px 45px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .input-group i:not(.password-toggle) {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            z-index: 10;
            padding: 4px;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }

        .login-button {
            width: 100%; 
            padding: 14px;
            background: #fff; 
            border: none;
            border-radius: 12px; 
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            color: #059669;
            cursor: pointer; 
            transition: var(--transition);
            margin-top: 4px;
        }

        .login-button:hover { background: #f8fafc; transform: translateY(-1px); }

        .error-msg {
            background: rgba(239, 68, 68, 0.25);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5; 
            padding: 10px;
            border-radius: 10px; 
            margin: 15px 30px 0;
            text-align: center; 
            display: none;
            font-size: 0.85rem;
        }

        .loading { display: none; gap: 10px; justify-content: center; align-items: center; }

        /* ================= OPTIMASI EKRAN HP (LOCK VIEWPORT) ================= */
        @media (max-width: 1024px) {
            body {
                padding: 16px;
            }
            .main-container { 
                justify-content: center;
                gap: 0;
            }
            .left-branding { 
                display: none !important; 
            }
            .login-container { 
                flex: 1 1 100%;
                max-width: 380px; /* Ukuran kotak diperkecil sedikit agar ideal di HP ramping */
                margin: 0 auto;
                animation: slideInRight 0.5s ease-out;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .login-header {
                padding: 28px 20px 16px;
            }
            .login-form {
                padding: 20px 20px;
            }
            .error-msg {
                margin: 12px 20px 0;
            }
            .form-logo {
                width: 60px;
                height: 60px;
            }
            .login-title {
                font-size: 1.35rem;
            }
            .input-group input {
                padding: 12px 40px;
                font-size: 0.9rem;
            }
            .input-group i:not(.password-toggle) {
                left: 14px;
            }
            .password-toggle {
                right: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="left-branding">
            <img src="pondok warna.png" alt="PONPES ALHIDAYAT" class="branding-logo">
            <h1 class="branding-title">PONPES ALHIDAYAT</h1>
            <p class="branding-subtitle">Krasak Temuroso Guntur Demak</p>
        </div>

        <div class="login-container">
            <div class="login-header">
                <img src="pondok warna.png" alt="Logo" class="form-logo">
                <h1 class="login-title">Selamat Datang</h1>
                <p class="login-subtitle">Masuk ke dashboard Admin</p>
            </div>

            <div class="error-msg" id="errorMsg">Username atau Password salah!</div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Username Admin" required autocomplete="username">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>

                <button type="submit" class="login-button" id="loginBtn">
                    <span class="btn-text">MASUK</span>
                    <div class="loading" id="loadingState">
                        <i class="fas fa-spinner fa-spin"></i> Memproses...
                    </div>
                </button>
            </form>
            
            <div style="text-align: center; padding-bottom: 20px; color: rgba(255,255,255,0.55); font-size: 0.75rem;">
                Aplikasi Manajemen Internal Ponpes Alhidayat
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorEl = document.getElementById('errorMsg');
        const toggleBtn = document.getElementById('togglePassword');
        const passwordField = document.getElementById('password');

        toggleBtn.addEventListener('click', () => {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            toggleBtn.classList.toggle('fa-eye');
            toggleBtn.classList.toggle('fa-eye-slash');
        });

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const btnText = document.querySelector('.btn-text');
            const loading = document.getElementById('loadingState');

            errorEl.style.display = 'none';
            btnText.style.display = 'none';
            loading.style.display = 'flex';

            setTimeout(() => {
                let config = JSON.parse(localStorage.getItem('appConfig')) || {};
                
                let targetUser = config.user || "admin"; 
                let targetPass = "admin"; 
                if (config.password) {
                    try {
                        targetPass = atob(config.password);
                    } catch(err) {
                        targetPass = config.password; 
                    }
                }

                if (usernameInput === targetUser && passwordInput === targetPass) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('currentUser', targetUser);
                    window.location.replace('index.html');
                } else {
                    errorEl.style.display = 'block';
                    btnText.style.display = 'block';
                    loading.style.display = 'none';
                }
            }, 600);
        });
    </script>
</body>
</html>
